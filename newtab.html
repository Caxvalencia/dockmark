<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nueva Pestaña</title>
    <link rel="stylesheet" href="newtab.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <img
            src="assets/dockmark-icon-32.png"
            alt="DockMark Logo"
            style="width: 32px; height: 32px"
          />
          <h2>DockMark</h2>
        </div>

        <div class="search-container">
          <input type="text" id="search-input" placeholder="Buscar..." />
          <div class="search-filters" aria-label="Filtros de búsqueda">
            <select id="search-type-filter" title="Tipo de resultado">
              <option value="all">Todo</option>
              <option value="links">Enlaces</option>
              <option value="folders">Carpetas</option>
            </select>
            <select id="search-scope-filter" title="Alcance de búsqueda">
              <option value="all">Todos</option>
              <option value="current">Espacio actual</option>
            </select>
            <input
              type="text"
              id="domain-filter"
              placeholder="Dominio"
              title="Filtrar por dominio"
            />
          </div>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-section">
            <h3>ESPACIOS</h3>
            <ul id="sidebar-spaces">
              <!-- Espacios generados por JS -->
            </ul>
          </div>
        </nav>

        <div class="sidebar-footer">
          <div class="settings-panel">
            <label>
              Tema
              <select id="theme-select">
                <option value="system">Sistema</option>
                <option value="light">Claro</option>
                <option value="dark">Oscuro</option>
              </select>
            </label>
            <label>
              Densidad
              <select id="density-select">
                <option value="compact">Compacta</option>
                <option value="comfortable">Cómoda</option>
                <option value="large">Grande</option>
              </select>
            </label>
            <label>
              Iconos
              <input type="range" id="icon-size-input" min="24" max="56" />
            </label>
            <label>
              Ancho mínimo
              <input
                type="number"
                id="min-card-width-input"
                min="180"
                max="420"
                step="10"
              />
            </label>
            <label>
              Acento
              <input type="color" id="accent-color-input" />
            </label>
            <div class="settings-actions">
              <button class="settings-btn" id="export-config-btn">
                Exportar
              </button>
              <button class="settings-btn" id="import-config-btn">
                Importar
              </button>
              <input
                type="file"
                id="import-config-input"
                accept="application/json"
                hidden
              />
            </div>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <header class="main-header">
          <h1 id="current-space-title">Mis Colecciones</h1>
          <div class="header-actions">
            <span class="collection-count" id="collection-count"
              >0 colecciones</span
            >
            <button id="add-collection-btn" class="primary-btn">
              + AÑADIR COLECCIÓN
            </button>
          </div>
        </header>

        <div
          class="view-controls"
          style="
            border-bottom: none;
            padding-bottom: 0;
            justify-content: flex-end;
          "
        >
          <button class="control-btn" id="expand-all-btn">EXPANDIR TODO</button>
          <button class="control-btn" id="collapse-all-btn">
            COLAPSAR TODO
          </button>
          <button class="control-btn" id="diagnostics-btn">DIAGNÓSTICO</button>
        </div>

        <div id="collections-container" class="collections-container">
          <!-- Las colecciones se inyectarán aquí -->
        </div>
      </main>
    </div>

    <!-- Menú Contextual -->
    <div id="context-menu" class="context-menu hidden">
      <ul>
        <li id="cm-open-new">Abrir en pestaña nueva</li>
        <li id="cm-copy-url">Copiar URL</li>
        <li id="cm-move">Mover a colección</li>
        <li id="cm-edit">Editar</li>
        <li id="cm-delete" class="danger">Eliminar</li>
      </ul>
    </div>

    <!-- Modal de Edición -->
    <div id="edit-modal" class="modal hidden">
      <div class="modal-content">
        <h3 id="modal-title">Editar Marcador</h3>
        <div class="form-group">
          <label for="edit-name">Nombre</label>
          <input type="text" id="edit-name" />
        </div>
        <div class="form-group" id="edit-url-group">
          <label for="edit-url">URL</label>
          <input type="text" id="edit-url" />
        </div>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn">Cancelar</button>
          <button id="modal-save" class="btn primary-btn">Guardar</button>
        </div>
      </div>
    </div>

    <div id="move-modal" class="modal hidden">
      <div class="modal-content">
        <h3>Mover marcador</h3>
        <div class="form-group">
          <label for="move-target">Colección</label>
          <select id="move-target"></select>
        </div>
        <div class="modal-actions">
          <button id="move-cancel" class="btn">Cancelar</button>
          <button id="move-save" class="btn primary-btn">Mover</button>
        </div>
      </div>
    </div>

    <div id="diagnostics-modal" class="modal hidden">
      <div class="modal-content wide-modal">
        <h3>Diagnóstico</h3>
        <div class="diagnostics-actions">
          <button id="find-duplicates-btn" class="btn">Buscar duplicados</button>
          <button id="check-broken-btn" class="btn">Revisar enlaces rotos</button>
        </div>
        <div id="diagnostics-results" class="diagnostics-results"></div>
        <div class="modal-actions">
          <button id="diagnostics-close" class="btn primary-btn">Cerrar</button>
        </div>
      </div>
    </div>

    <script src="newtab.js"></script>
  </body>
</html>
