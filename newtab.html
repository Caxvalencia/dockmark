<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nueva Pestaña</title>
    <link rel="stylesheet" href="newtab.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <img
            src="assets/dockmark-icon-32.png"
            alt="DockMark Logo"
            style="width: 32px; height: 32px"
          />
          <h2>DockMark</h2>
        </div>

        <div class="search-container">
          <input type="text" id="search-input" placeholder="Buscar..." />
        </div>

        <nav class="sidebar-nav">
          <div class="nav-section">
            <h3>ESPACIOS</h3>
            <ul id="sidebar-spaces">
              <!-- Espacios generados por JS -->
            </ul>
          </div>
        </nav>

        <div class="sidebar-footer">
          <button class="settings-btn" id="theme-toggle">🌓 Cambiar Tema</button>
          <button class="settings-btn">⚙ Configuración</button>
        </div>
      </aside>

      <main class="main-content">
        <header class="main-header">
          <h1 id="current-space-title">Mis Colecciones</h1>
          <div class="header-actions">
            <span class="collection-count" id="collection-count"
              >0 colecciones</span
            >
            <button id="add-collection-btn" class="primary-btn">
              + AÑADIR COLECCIÓN
            </button>
          </div>
        </header>

        <div class="view-controls" style="border-bottom: none; padding-bottom: 0; justify-content: flex-end;">
          <button class="control-btn" id="expand-all-btn">EXPANDIR TODO</button>
          <button class="control-btn" id="collapse-all-btn">COLAPSAR TODO</button>
        </div>

        <div id="collections-container" class="collections-container">
          <!-- Las colecciones se inyectarán aquí -->
        </div>
      </main>
    </div>

    <!-- Menú Contextual -->
    <div id="context-menu" class="context-menu hidden">
      <ul>
        <li id="cm-open-new">Abrir en pestaña nueva</li>
        <li id="cm-edit">Editar</li>
        <li id="cm-delete" class="danger">Eliminar</li>
      </ul>
    </div>

    <!-- Modal de Edición -->
    <div id="edit-modal" class="modal hidden">
      <div class="modal-content">
        <h3 id="modal-title">Editar Marcador</h3>
        <div class="form-group">
          <label for="edit-name">Nombre</label>
          <input type="text" id="edit-name" />
        </div>
        <div class="form-group" id="edit-url-group">
          <label for="edit-url">URL</label>
          <input type="text" id="edit-url" />
        </div>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn">Cancelar</button>
          <button id="modal-save" class="btn primary-btn">Guardar</button>
        </div>
      </div>
    </div>

    <script src="newtab.js"></script>
  </body>
</html>
